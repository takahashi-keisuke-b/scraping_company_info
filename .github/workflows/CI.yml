# ==========================================
# GitHub Actions 自動品質チェック（CI）設定
# ==========================================

# 1. ワークフロー（自動化処理）の識別名
name: Python Code Quality Check

# 2. トリガー（ロボットが起動するタイミング）の設定
on:
  push:
    branches: [ "main" ] # mainブランチに「手動同期（push）」された瞬間に自動起動

# 3. ロボットが実行する具体的な仕事（ジョブ）の定義
jobs:
  lint-and-test:
    # クラウド上に、テスト専用のまっさらなパソコン（Linux Ubuntu）を1台自動でレンタルする
    runs-on: ubuntu-latest

    steps:
    # ------------------------------------------------------------
    # 【ステップ1】あなたがプッシュした最新のコードを、このパソコンにダウンロードする
    # ------------------------------------------------------------
    - name: Checkout repository code
      uses: actions/checkout@v4

    # ------------------------------------------------------------
    # 【ステップ2】パソコンに Python 3.10 の環境を自動で構築する
    # ------------------------------------------------------------
    - name: Set up Python 3.10
      uses: actions/setup-python@v5 # 前回のタイポを修正した、正しい公式ロボット名
      with:
        python-version: "3.10"

    # ------------------------------------------------------------
    # 【ステップ3】自動チェック（査定）に必要なツールをインストールする
    # ------------------------------------------------------------
    - name: Install Linting Tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 mypy

    # ------------------------------------------------------------
    # 【ステップ4】致命的な「文法エラー」がないか自動査定する（flake8）
    # ------------------------------------------------------------
    - name: Lint with flake8
      run: |
        # 構文エラー（かっこ閉じ忘れ）や、存在しない変数の呼び出しなど、
        # アプリが動いた瞬間に強制終了（クラッシュ）するバグがないか、コード全体を熟読・チェック
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # ------------------------------------------------------------
    # 【ステップ5】データの「型定義」に矛盾がないか自動査定する（mypy）
    # ------------------------------------------------------------
    - name: Type check with mypy
      run: |
        # あなたがドメイン層（Company.pyやUrl.py）などで綺麗に定義している
        # 「型ヒント」の辻褄がプログラム全体で正しく合っているかを厳格にチェック
        # （外部ライブラリの型情報が足りないという警告はスルーするオプションを付与）
        mypy . --ignore-missing-imports